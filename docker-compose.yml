version: '3.8'

services:
  mcp-vault:
    build: .
    ports:
      # FIX M-7: Solo escuchar en localhost — nunca exponer directo a internet en dev
      - "127.0.0.1:8080:8080"
    environment:
      - PORT=8080
      - NODE_ENV=production
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:?Variable requerida}
      - MCP_AUTH_TOKENS=${MCP_AUTH_TOKENS:?Variable requerida}
      - TRANSPORT=http
    # FIX M-7: Hardening del contenedor
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    tmpfs:
      - /tmp:size=10m,noexec,nosuid
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health', r => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
